services:
  - type: web
    name: ecommerce-backend
    env: node
    region: oregon
    branch: main
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGODB_URI
        value: "REPLACE_WITH_YOUR_ATLAS_CONNECTION_STRING"
      - key: JWT_SECRET
        value: "REPLACE_WITH_A_STRONG_RANDOM_SECRET"
      - key: STRIPE_SECRET_KEY
        value: "REPLACE_WITH_YOUR_STRIPE_SECRET_KEY"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"

static_sites:
  - name: ecommerce-frontend
    root: frontend/client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "REPLACE_WITH_BACKEND_URL_OR_LEAVE_EMPTY"
