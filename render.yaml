services:
  - type: web
    name: ecommerce-backend
    env: node
    region: oregon
    branch: main
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    # Root directory where your Node app lives in the repo
    root: server
    envVars:
      - key: MONGODB_URI
        value: "REPLACE_WITH_YOUR_ATLAS_CONNECTION_STRING"
      - key: JWT_SECRET
        value: "REPLACE_WITH_A_STRONG_RANDOM_SECRET"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"

  - type: static
    name: ecommerce-frontend
    env: static
    region: oregon
    branch: main
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    staticPublish: frontend/dist
    root: frontend
    envVars:
      - key: VITE_API_URL
        value: "REPLACE_WITH_BACKEND_URL_OR_LEAVE_EMPTY"
