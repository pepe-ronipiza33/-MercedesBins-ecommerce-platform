services:
  - type: web
    name: ecommerce-backend
    env: node
    region: oregon
    branch: main
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"

static_sites:
  - name: ecommerce-frontend
    root: frontend/client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://ecommerce-backend.onrender.com"
